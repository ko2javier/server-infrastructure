services:
  auth-service:
    build:
      context: ./auth-currency-data-hub
    ports:
      - "4000:4000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api-service:
    build:
      context: ./currency-data-hub
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  gateway:
    build:
      context: ./api-gateway-currency-data-hub
    ports:
      - "7000:7000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      api-service:
        condition: service_healthy
